<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In Transit</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --paper: #faf7f2;
    --ink: #1c1a17;
    --muted: #8a8278;
    --line: #e6e0d6;
    --accent: #2f5d50;
    --accent-soft: #e8efe9;
    --amber: #c4702a;
    --amber-soft: #f6ebe0;
    --card: #ffffff;
    --shadow: 0 1px 2px rgba(28,26,23,.04), 0 8px 24px rgba(28,26,23,.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 32px 20px 80px;
    min-height: 100vh;
  }

  .wrap { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 8px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(34px, 8vw, 52px);
    line-height: 0.98;
    letter-spacing: -0.02em;
  }
  h1 em { font-style: italic; color: var(--accent); }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 22px 0 18px;
    flex-wrap: wrap;
  }
  .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .count b { color: var(--ink); }

  .list { display: flex; flex-direction: column; gap: 12px; }

  .pkg {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .pkg:hover { border-color: #d8d0c2; }

  .pkg-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .nick {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }
  .carrier-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .carrier {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 2px 7px;
    border-radius: 6px;
  }
  .tracking { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); word-break: break-all; }

  .eta-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 999px;
    white-space: nowrap;
    letter-spacing: 0.02em;
    background: var(--amber-soft);
    color: var(--amber);
  }
  .eta-badge.soon { background: var(--accent-soft); color: var(--accent); }

  .pkg-bottom {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .eta-label { font-size: 13px; color: var(--muted); }
  .eta-label b { color: var(--ink); font-weight: 600; }

  .track-link {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    color: #fff;
    background: var(--accent);
    border: 1px solid var(--accent);
    padding: 8px 14px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: background .15s ease;
    white-space: nowrap;
  }
  .track-link:hover { background: #264b40; }
  .track-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .track-link svg { width: 13px; height: 13px; }

  footer {
    margin-top: 28px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }
  footer b { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Package Tracker</div>
    <h1>In <em>Transit</em></h1>
  </header>

  <div class="toolbar">
    <div class="count"><b id="count">5</b> packages on the way</div>
  </div>

  <div class="list" id="list"></div>

  <footer>
    Tap <b>Track</b> on any package to check its live status on the carrier's site.<br>
    Sorted by expected arrival.
  </footer>
</div>

<script>
  // Carrier tracking URL builders
  const CARRIER_URL = {
    UPS:   n => `https://www.ups.com/track?tracknum=${encodeURIComponent(n)}`,
    FedEx: n => `https://www.fedex.com/fedextrack/?trknbr=${encodeURIComponent(n)}`,
    USPS:  n => `https://tools.usps.com/go/TrackConfirmAction?tLabels=${encodeURIComponent(n)}`,
    DHL:   n => `https://www.dhl.com/us-en/home/tracking.html?tracking-id=${encodeURIComponent(n)}`,
  };

  // Your packages. Edit this list anytime.
  const packages = [
    { nick: 'Norm jewels gift',   carrier: 'USPS',  tracking: '9400111206241454588926', eta: 'Tue, Jun 30', order: 0 },
    { nick: "Rocky's Matcha: hojicha", carrier: 'USPS', tracking: '9261290400210748815191', eta: 'Tue, Jun 30', order: 0 },
    { nick: 'Aritzia black pants', carrier: 'UPS',  tracking: '1ZC1G3720316158225',     eta: 'Wed, Jul 1',  order: 1 },
    { nick: 'Rosie Coco London leash', carrier: 'USPS', tracking: 'LT364159186GB',       eta: 'Wed, Jul 1',  order: 1 },
    { nick: 'Chan Luu necklace',  carrier: 'FedEx', tracking: '382324214750',            eta: 'Wed, Jul 1',  order: 1 },
    { nick: 'Tom Ford croc wallet', carrier: 'UPS', tracking: '1Z2E08V20217100889',     eta: 'Wed, Jul 1',  order: 1 },
    { nick: 'Aritzia blue pants', carrier: 'FedEx', tracking: '873662538628',            eta: 'Thu, Jul 2',  order: 2 },
    { nick: 'Reformation #1',     carrier: 'FedEx', tracking: '382332014991',            eta: 'Thu, Jul 2',  order: 2 },
    { nick: 'Reformation #2',     carrier: 'FedEx', tracking: '382332125156',            eta: 'Thu, Jul 2',  order: 2 },
  ];

  const list = document.getElementById('list');

  packages.forEach(p => {
    const url = CARRIER_URL[p.carrier] ? CARRIER_URL[p.carrier](p.tracking) : '#';
    const soon = p.order <= 0;
    const card = document.createElement('div');
    card.className = 'pkg';
    card.innerHTML = `
      <div class="pkg-top">
        <div style="flex:1; min-width:0">
          <div class="nick">${p.nick}</div>
          <div class="carrier-row">
            <span class="carrier">${p.carrier}</span>
            <span class="tracking">${p.tracking}</span>
          </div>
        </div>
        <span class="eta-badge ${soon ? 'soon' : ''}">${p.eta}</span>
      </div>
      <div class="pkg-bottom">
        <div class="eta-label">Arrives <b>${p.eta}</b></div>
        <a class="track-link" href="${url}" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          Track
        </a>
      </div>
    `;
    list.appendChild(card);
  });

  document.getElementById('count').textContent = packages.length;
</script>
</body>
</html>
